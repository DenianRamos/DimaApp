name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Dima.sln

      - name: Build
        run: dotnet build Dima.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Dima.sln --configuration Release --no-build --verbosity normal

      - name: Build Docker image
        run: docker build -t dima-api:${{ github.sha }} .
