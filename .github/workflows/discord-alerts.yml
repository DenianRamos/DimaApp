name: Discord Alerts

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  notify-discord:
    if: ${{ secrets.DISCORD_WEBHOOK != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          WORKFLOW_NAME: Discord Alerts
          WORKFLOW_STATUS: started
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          REPOSITORY_NAME: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "username": "GitHub Actions",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "content": (
                  f"Repositorio: {os.environ['REPOSITORY_NAME']}\n"
                  f"Workflow: {os.environ['WORKFLOW_NAME']}\n"
                  f"Status: {os.environ['WORKFLOW_STATUS']}\n"
                  f"Branch: {os.environ['BRANCH_NAME']}\n"
                  f"Evento: {os.environ['EVENT_NAME']}\n"
                  f"Execucao: {os.environ['RUN_URL']}"
              ),
          }

          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(request) as response:
              print(f"Discord response: {response.status}")
          PY
